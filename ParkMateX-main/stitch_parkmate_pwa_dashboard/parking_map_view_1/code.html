<div class="flex-grow relative parking-grid overflow-auto p-8 flex items-center justify-center">

<div class="absolute top-20 left-6 z-10 space-y-2">
<div class="bg-surface-container-lowest/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-sm border border-outline-variant/10">

<p class="font-headline font-bold text-primary">North Plaza Level 2</p>
</div>
</div>

<button class="w-12 h-12 bg-surface-container-lowest rounded-xl shadow-lg flex items-center justify-center text-primary hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
<button class="w-12 h-12 bg-surface-container-lowest rounded-xl shadow-lg flex items-center justify-center text-primary hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>

<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>

<div class="absolute inset-0 bg-primary/5"></div>
<span class="text-[10px] font-bold text-on-tertiary-fixed-variant z-10">B13</span>
</div>
<!-- Recommended Spot (Active/Pulsing) -->
<div class="h-28 bg-secondary-container border-2 border-secondary spot-pulse rounded-lg flex items-center justify-center cursor-pointer relative group transition-transform active:scale-95">
<div class="text-center">
<p class="text-[10px] font-bold text-on-secondary-container tracking-wider uppercase">B14</p>
<p class="font-headline font-extrabold text-secondary text-xs">BEST</p>

<button class="bg-primary text-white text-[10px] font-bold py-1.5 rounded-lg hover:opacity-90">RESERVE</button>
</div>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-surface-container-lowest rotate-45 border-r border-b border-outline-variant/20"></div>
</div>
</div>
<div class="h-28 bg-tertiary-fixed rounded-lg border-2 border-on-tertiary-fixed-variant/10 flex items-end justify-center pb-2 relative overflow-hidden">
<span class="text-[10px] font-bold text-on-tertiary-fixed-variant">B15</span>
</div>
<div class="h-28 bg-surface-container-highest rounded-lg flex items-center justify-center text-[10px] font-bold text-outline opacity-40">B16</div>

</div>
<div class="h-28 bg-secondary-container/40 border border-secondary/20 rounded-lg flex items-center justify-center cursor-pointer hover:bg-secondary-container transition-colors group">

<div class="h-28 bg-tertiary-fixed rounded-lg border-2 border-on-tertiary-fixed-variant/10 flex items-end justify-center pb-2 relative overflow-hidden">

<span class="text-[10px] font-bold text-on-secondary-container tracking-wider uppercase">D27</span>
</div>
</div>
</div>

<div class="bg-surface-container-lowest/95 backdrop-blur-md p-4 rounded-2xl shadow-xl border border-outline-variant/10 pointer-events-auto flex gap-6">
