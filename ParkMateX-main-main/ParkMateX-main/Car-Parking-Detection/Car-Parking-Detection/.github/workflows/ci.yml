name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, "claude/**"]
  pull_request:
    branches: [main, master, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run black (check only)
        run: black --check --line-length=100 *.py tests/*.py

      - name: Run isort (check only)
        run: isort --check --profile=black --line-length=100 *.py tests/*.py

      - name: Run flake8
        run: flake8 *.py tests/*.py || true
        continue-on-error: true

      - name: Run mypy (optional)
        run: mypy *.py || true
        continue-on-error: true

  tests:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run config tests
        run: pytest tests/test_config.py -v

      - name: Run all tests (with coverage)
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing || true
        continue-on-error: true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.10'
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
